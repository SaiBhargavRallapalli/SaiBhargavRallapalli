name: Latest blog posts

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest Medium posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in Medium posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://saibhargavr.medium.com/feed"
          max_post_count: "5"
          comment_tag_name: "BLOG-POST-LIST"
          retry_count: "2"
          retry_wait_time: "5"
          template: "- $randomEmoji(📝,💡,🚀) [$title]($url)"
          commit_message: "docs: update latest blog posts in README"
